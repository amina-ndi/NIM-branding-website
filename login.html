<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | NIM School Management Software</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="login.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body>
    <div class="login-page">
        <!-- Background Blobs -->
        <div class="login-bg">
            <div class="blob blob-1"></div>
            <div class="blob blob-2"></div>
        </div>

        <div class="container flex-center">
            <div class="login-card reveal-anim">
                <div class="login-header">
                    <a href="index.html" class="logo">
                        <i data-lucide="graduation-cap" class="logo-icon"></i>
                        <span class="logo-text">NIM</span>
                    </a>
                    <h1>Welcome Back</h1>
                    <p>Enter your credentials to access your dashboard</p>
                </div>

                <form class="login-form">
                    <div class="form-group">
                        <label for="email">Email Address</label>
                        <div class="input-wrapper">
                            <i data-lucide="mail"></i>
                            <input type="email" id="email" placeholder="name@school.com" required>
                        </div>
                    </div>

                    <div class="form-group">
                        <div class="label-row">
                            <label for="password">Password</label>
                            <a href="#" class="forgot-link">Forgot?</a>
                        </div>
                        <div class="input-wrapper">
                            <i data-lucide="lock"></i>
                            <input type="password" id="password" placeholder="••••••••" required>
                        </div>
                    </div>

                    <div class="form-options">
                        <label class="checkbox-container">
                            <input type="checkbox">
                            <span class="checkmark"></span>
                            Remember me
                        </label>
                    </div>

                    <button type="submit" class="btn btn-primary btn-full">
                        Login to Portal
                        <i data-lucide="chevron-right"></i>
                    </button>
                </form>

                <div class="login-footer">
                    <p>Don't have an account? <a href="#">Contact Admin</a> or <a href="signup.html"
                            class="text-primary font-bold">Sign Up</a></p>
                </div>

                <div class="back-home">
                    <a href="index.html">
                        <i data-lucide="arrow-left"></i>
                        Back to Homepage
                    </a>
                </div>
            </div>
        </div>
    </div>

    <script>
        lucide.createIcons();

        // Simple entrance animation
        document.addEventListener('DOMContentLoaded', () => {
            const card = document.querySelector('.login-card');
            card.style.opacity = '0';
            card.style.transform = 'translateY(20px)';

            setTimeout(() => {
                card.style.transition = 'all 0.6s cubic-bezier(0.4, 0, 0.2, 1)';
                card.style.opacity = '1';
                card.style.transform = 'translateY(0)';
            }, 100);
        });
    </script>
</body>

</html>
