<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up | NIM School Management Software</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="signup.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body>
    <div class="signup-page">
        <!-- Background Blobs -->
        <div class="signup-bg">
            <div class="blob blob-1"></div>
            <div class="blob blob-2"></div>
            <div class="blob blob-3"></div>
        </div>

        <div class="container flex-center">
            <div class="signup-card">
                <div class="signup-header">
                    <a href="index.html" class="logo">
                        <i data-lucide="graduation-cap" class="logo-icon"></i>
                        <span class="logo-text">NIM</span>
                    </a>
                    <h1>Get Started for Free</h1>
                    <p>Experience the future of school management within minutes.</p>
                </div>

                <form class="signup-form">
                    <div class="form-row">
                        <div class="form-group">
                            <label for="fullname">Full Name</label>
                            <div class="input-wrapper">
                                <i data-lucide="user"></i>
                                <input type="text" id="fullname" placeholder="Enter your name" required>
                            </div>
                        </div>
                        <div class="form-group">
                            <label for="schoolname">School Name</label>
                            <div class="input-wrapper">
                                <i data-lucide="school"></i>
                                <input type="text" id="schoolname" placeholder="School name" required>
                            </div>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="email">Work Email</label>
                        <div class="input-wrapper">
                            <i data-lucide="mail"></i>
                            <input type="email" id="email" placeholder="name@school.com" required>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="phone">Phone Number</label>
                        <div class="input-wrapper">
                            <i data-lucide="phone"></i>
                            <input type="tel" id="phone" placeholder="03xx-xxxxxxx" required>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="password">Create Password</label>
                        <div class="input-wrapper">
                            <i data-lucide="lock"></i>
                            <input type="password" id="password" placeholder="At least 8 characters" required>
                        </div>
                    </div>

                    <div class="form-options">
                        <label class="checkbox-container">
                            <input type="checkbox" checked required>
                            <span class="checkmark"></span>
                            I agree to the <a href="#">Terms</a> and <a href="#">Privacy Policy</a>
                        </label>
                    </div>

                    <button type="submit" class="btn btn-primary btn-full">
                        Create My Account
                        <i data-lucide="chevron-right"></i>
                    </button>
                </form>

                <div class="signup-footer">
                    <p>Already have an account? <a href="login.html" class="text-primary font-bold">Sign In</a></p>
                </div>

                <div class="back-home">
                    <a href="index.html">
                        <i data-lucide="arrow-left"></i>
                        Back to Homepage
                    </a>
                </div>
            </div>
        </div>
    </div>

    <script>
        lucide.createIcons();

        // Entrance animation
        document.addEventListener('DOMContentLoaded', () => {
            const card = document.querySelector('.signup-card');
            card.style.opacity = '0';
            card.style.transform = 'translateY(30px)';

            setTimeout(() => {
                card.style.transition = 'all 0.8s cubic-bezier(0.34, 1.56, 0.64, 1)';
                card.style.opacity = '1';
                card.style.transform = 'translateY(0)';
            }, 150);
        });
    </script>
</body>

</html>
